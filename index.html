<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🇮🇹 Italian Verbs</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background: #f7fafc;
      color: #2d3748;
    }
    h1 {
      color: #2c7a7b;
      text-align: center;
      margin-bottom: 10px;
    }
    .subtitle {
      text-align: center;
      color: #718096;
      margin-bottom: 20px;
      font-size: 0.95em;
    }
    .verb-card {
      background: white;
      border-radius: 10px;
      padding: 16px;
      margin: 12px 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      cursor: pointer;
      border-left: 4px solid transparent;
    }
    .verb-card.active {
      border-left: 4px solid #2c7a7b;
      background: #f0fff4;
    }
    .verb-header {
      font-weight: 700;
      color: #2c7a7b;
      font-size: 1.1em;
      margin-bottom: 10px;
    }
    .verb-meaning {
      color: #4a5568;
      margin-bottom: 12px;
    }
    .tabs {
      display: flex;
      border-bottom: 1px solid #e2e8f0;
      margin-bottom: 12px;
      font-size: 0.95em;
    }
    .tab {
      padding: 6px 12px;
      cursor: pointer;
      border: 1px solid transparent;
      border-bottom: 0;
      border-radius: 6px 6px 0 0;
      margin-right: 5px;
      color: #718096;
    }
    .tab:hover {
      background: #f7fafc;
    }
    .tab.active {
      background: #ebf8ff;
      border: 1px solid #cbd5e0;
      border-bottom: 0;
      color: #2c5282;
    }
    .tab-content {
      display: none;
      padding: 10px;
      background: #f7fafc;
      border-radius: 6px;
      font-size: 0.95em;
    }
    .tab-content.active {
      display: block;
    }
  </style>
</head>
<body>
  <h1>🇮🇹 Italian Verbs</h1>
  <p class="subtitle">
    Click any verb, then choose a tense.
  </p>

  <div id="verbs-list"></div>

  <script>
    // --- Data setup ---
    let verbs = [];

    fetch("verbi.json")
      .then(r => r.json())
      .then(data => {
        verbs = data;
        renderVerbs();
      });

    // --- Render all verb cards ---
    function renderVerbs() {
      const container = document.getElementById("verbs-list");
      container.innerHTML = "";

      verbs.forEach((verb, i) => {
        const card = document.createElement("div");
        card.className = "verb-card";

        card.innerHTML = `
          <div class="verb-header">${verb.infinitive}</div>
          <div class="verb-meaning">${verb.meaning}</div>

          <div class="tabs">
            <div class="tab present" data-verb="${i}" onclick="showTab(${i}, 'present')">Presente</div>
            <div class="tab past" data-verb="${i}" onclick="showTab(${i}, 'past')">Passato</div>
            <div class="tab future" data-verb="${i}" onclick="showTab(${i}, 'future')">Futuro</div>
          </div>

          <div class="tab-content present" id="present-${i}">
            <pre>${verb.present.join("\n")}</pre>
          </div>

          <div class="tab-content past" id="past-${i}">
            <pre>${verb.past.join("\n")}</pre>
          </div>

          <div class="tab-content future" id="future-${i}">
            <pre>${verb.future.join("\n")}</pre>
          </div>
        `;

        container.appendChild(card);
      });

      if (verbs.length > 0) {
        showTab(0, "present");
      }
    }

    // --- Show active tab ---
    function showTab(i, tense) {
      document.querySelectorAll(".verb-card").forEach(c => {
        c.classList.remove("active");
      });
      document.querySelectorAll(".tab-content").forEach(c => {
        c.classList.remove("active");
      });
      document.querySelectorAll(".tab").forEach(t => {
        t.classList.remove("active");
      });

      document.querySelector(`.tab[data-verb="${i}"][class*="${tense}"]`).classList.add("active");
      document.getElementById(`${tense}-${i}`).classList.add("active");

      document.querySelector(`.verb-card:nth-child(${i + 1})`).classList.add("active");
      document.querySelector(`.verb-card:nth-child(${i + 1})`).scrollIntoView({ behavior: "smooth", block: "center" });
    }
  </script>
</body>
</html>
