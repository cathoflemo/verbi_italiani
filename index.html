    .tab.active {

    // --- Render all verb cards ---
    function renderVerbs() {
      const container = document.getElementById("verbs-list");
      container.innerHTML = "";

      verbs.forEach((verb, i) => {
        const card = document.createElement("div");
        card.className = "verb-card";

        card.innerHTML = `
          <div class="verb-header">${verb.infinitive}</div>
          <div class="verb-meaning">${verb.meaning}</div>

          <div class="tabs">
            <div class="tab present" data-verb="${i}" onclick="showTab(${i}, 'present')">Presente</div>
            <div class="tab past" data-verb="${i}" onclick="showTab(${i}, 'past')">Passato</div>
            <div class="tab future" data-verb="${i}" onclick="showTab(${i}, 'future')">Futuro</div>
          </div>

          <div class="tab-content present" id="present-${i}">
            <pre>${verb.present.join("\n")}</pre>
          </div>

          <div class="tab-content past" id="past-${i}">
            <pre>${verb.past.join("\n")}</pre>
          </div>

          <div class="tab-content future" id="future-${i}">
            <pre>${verb.future.join("\n")}</pre>
          </div>
        `;

        container.appendChild(card);
      });

      if (verbs.length > 0) {
        showTab(0, "present");
      }
    }

    // --- Show active tab ---
    function showTab(i, tense) {
      document.querySelectorAll(".verb-card").forEach(c => {
        c.classList.remove("active");
      });
      document.querySelectorAll(".tab-content").forEach(c => {
        c.classList.remove("active");
      });
      document.querySelectorAll(".tab").forEach(t => {
        t.classList.remove("active");
      });

      document.querySelector(`.tab[data-verb="${i}"][class*="${tense}"]`).classList.add("active");
      document.getElementById(`${tense}-${i}`).classList.add("active");

      document.querySelector(`.verb-card:nth-child(${i + 1})`).classList.add("active");
      document.querySelector(`.verb-card:nth-child(${i + 1})`).scrollIntoView({ behavior: "smooth", block: "center" });
