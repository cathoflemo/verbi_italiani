<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>verbi italiani</title>

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background: #f7fafc;
      color: #2d3748;
    }

    h1 {
      color: #2c7a7b;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #718096;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .verb-card {
      background: white;
      border-radius: 10px;
      padding: 16px;
      margin: 12px 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      border-left: 4px solid transparent;
    }

    .verb-card.active {
      border-left: 4px solid #2c7a7b;
      background: #f0fff4;
    }

    .verb-header {
      font-weight: bold;
      color: #2c7a7b;
      margin-bottom: 6px;
    }

    .verb-meaning {
      color: #4a5568;
      margin-bottom: 10px;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid #ddd;
      margin-bottom: 10px;
    }

    .tab {
      padding: 6px 12px;
      cursor: pointer;
      color: #666;
    }

    .tab.active {
      color: #2c5282;
      font-weight: bold;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }
  </style>
</head>

<body>

<h1>🇮🇹 Verbi italiani 🇮🇹</h1>
<p class="subtitle">Cerca e studia i verbi</p>

<input type="text" id="search" placeholder="Cerca un verbo..." oninput="filterVerbs()">

<div id="verbs-list"></div>

<script>
let verbs = [
  { infinitive: "essere", meaning: "to be",
    present: ["io sono","tu sei","lui/lei è","noi siamo","voi siete","loro sono"],
    past: ["io sono stato/a","tu sei stato/a","lui/lei è stato/a","noi siamo stati/e","voi siete stati/e","loro sono stati/e"],
    future: ["io sarò","tu sarai","lui/lei sarà","noi saremo","voi sarete","loro saranno"]
  },
  { infinitive: "avere", meaning: "to have",
    present: ["io ho","tu hai","lui/lei ha","noi abbiamo","voi avete","loro hanno"],
    past: ["io ho avuto","tu hai avuto","lui/lei ha avuto","noi abbiamo avuto","voi avete avuto","loro hanno avuto"],
    future: ["io avrò","tu avrai","lui/lei avrà","noi avremo","voi avrete","loro avranno"]
  },
  { infinitive: "andare", meaning: "to go",
    present: ["io vado","tu vai","lui/lei va","noi andiamo","voi andate","loro vanno"],
    past: ["io sono andato/a","tu sei andato/a","lui/lei è andato/a","noi siamo andati/e","voi siete andati/e","loro sono andati/e"],
    future: ["io andrò","tu andrai","lui/lei andrà","noi andremo","voi andrete","loro andranno"]
  },
  { infinitive: "fare", meaning: "to do",
    present: ["io faccio","tu fai","lui/lei fa","noi facciamo","voi fate","loro fanno"],
    past: ["io ho fatto","tu hai fatto","lui/lei ha fatto","noi abbiamo fatto","voi avete fatto","loro hanno fatto"],
    future: ["io farò","tu farai","lui/lei farà","noi faremo","voi farete","loro faranno"]
  }
];

// sort once
verbs.sort((a,b)=>a.infinitive.localeCompare(b.infinitive,"it"));

renderVerbs(verbs);

function renderVerbs(list){
  const container=document.getElementById("verbs-list");
  container.innerHTML="";

  list.forEach(verb=>{
    const card=document.createElement("div");
    card.className="verb-card";

    card.innerHTML=`
      <div class="verb-header">${verb.infinitive}</div>
      <div class="verb-meaning">${verb.meaning}</div>

      <div class="tabs">
        <div class="tab" onclick="showTab(this,'present')">Presente</div>
        <div class="tab" onclick="showTab(this,'past')">Passato prossimo</div>
        <div class="tab" onclick="showTab(this,'future')">Futuro semplice</div>
      </div>

      <div class="tab-content present"><pre>${verb.present.join("\n")}</pre></div>
      <div class="tab-content past"><pre>${verb.past.join("\n")}</pre></div>
      <div class="tab-content future"><pre>${verb.future.join("\n")}</pre></div>
    `;

    container.appendChild(card);
  });
}

function filterVerbs(){
  const q=document.getElementById("search").value.toLowerCase();

  const filtered=verbs.filter(v =>
    v.infinitive.toLowerCase().includes(q) ||
    v.meaning.toLowerCase().includes(q)
  );

  renderVerbs(filtered);
}

function showTab(tab,tense){
  const card=tab.closest(".verb-card");

  card.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  card.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));

  tab.classList.add("active");
  card.querySelector(`.${tense}`).classList.add("active");

  document.querySelectorAll(".verb-card").forEach(c=>c.classList.remove("active"));
  card.classList.add("active");
}
</script>

</body>
</html>
